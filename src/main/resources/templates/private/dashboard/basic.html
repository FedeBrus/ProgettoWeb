<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{snippets/base :: layout(~{::content}, ~{::footer}, '')}">

<th:block th:fragment="content">
    <h1 class="text-center text-primary">DASHBOARD UTENTE BASIC</h1>
    <h3>Benvenuto <th:block th:text="${username}"/></h3>
    <a class="btn btn-primary block" th:href="@{/dashboard/user/profile}" role="button">Visualizza profilo</a>
    <a class="btn btn-primary block" th:href="@{/dashboard/user/change_password}" role="button">Cambio password</a>
    <a class="btn btn-primary block" th:href="@{/dashboard/user/training}" role="button">Allenamento</a>
    <a class="btn btn-primary block" th:href="@{/dashboard/user/personal_stats}" role="button">Visualizza statistiche</a>
    <a class="btn btn-primary block" th:href="@{/dashboard/user/upgrade}" role="button">Upgrade</a>
    <th:block th:insert="~{snippets/review}"/>
</th:block>

</html>
