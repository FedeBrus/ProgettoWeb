<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{snippets/base :: layout(~{::content}, ~{::footer}, '')}">

<th:block th:fragment="content">
    <div id="container">
        <h1 class="text-center">Lascia una recensione!</h1>

        <!-- Il form verrà intercettato -->
        <form id="reviewForm">
            <div class="form-group my-2">
                <label for="review">Recensione</label>
                <textarea class="form-control" id="review"></textarea>
                <small id="reviewHelp" class="form-text text-muted">Il tuo username verrà registrato insieme alla recensione</small>
            </div>
            <div class="container py-4">
                <button type="submit" class="btn btn-primary">Invia</button>
                <button type="reset" class="btn btn-danger">Reset</button>
            </div>
        </form>

        <a class="btn btn-primary block my-2" href="/dashboard" role="button">Torna alla dashboard</a>

    </div>
    <script th:src="@{/js/review.js}"></script>
</th:block>
</html>
